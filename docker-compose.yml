services:
  sqlserver: # Nome lógico do serviço (vai virar a rede DNS: sqlserver).
    image: mcr.microsoft.com/mssql/server:2022-latest # Imagem do SQL Server 2022.
    container_name: sqlserver2022 # Nome explícito do container (opcional; facilita comandos/identificação).
    ports: # Mapeamentos de porta host:container.
      - "1433:1433" # Expõe a 1433 do host para a 1433 do SQL Server no container.
    environment: # Variáveis de ambiente passadas ao container.
      ACCEPT_EULA: ${ACCEPT_EULA} # Aceita a licença (valor vem do arquivo .env).
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD} # Senha do usuário SA (do .env; NÃO commitá).
      #MSSQL_MEMORY_LIMIT_MB: ${MSSQL_MEMORY_LIMIT_MB}  #limita a memória do SQL
      TZ: ${TZ} # Timezone do container (do .env), ex.: America/Sao_Paulo.
      MSSQL_PID: ${MSSQL_PID} # opcional: torne explícita a edição
    volumes: # Montagens de volumes.
      - "C:\\sqlserver_data\\data:/var/opt/mssql/data"
      - "C:\\sqlserver_data\\log:/var/opt/mssql/log"
      - "C:\\sqlserver_data\\secrets:/var/opt/mssql/secrets"
      - "C:\\sqlserver_data\\backup:/var/opt/mssql/backup"   # opcional

  rabbitmq:
    image: rabbitmq:4-management
    container_name: fiapcloudgames-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
      
  elasticsearch:
    image: elasticsearch:9.3.2
    container_name: fiapcloudgames-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    mem_limit: 2G

  users-api:
    build:
      context: ../UsersApi
      dockerfile: Users.Api/Dockerfile
    container_name: users-api
    depends_on:
      - sqlserver
    # restart: on-failure #avoiding the healthcheck
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=CloudGamesDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;"
    ports:
      - "5001:8080"

  catalog-api:
    build:
      context: ../CatalogApi
      dockerfile: Catalog.Api/Dockerfile
    container_name: catalog-api
    depends_on:
      - sqlserver
    # restart: on-failure #avoiding the healthcheck
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;"
    ports:
      - "5002:8080"

  payments-api:
    build:
      context: ../PaymentsApi
      dockerfile: Payments.Api/Dockerfile
    container_name: payments-api
    depends_on:
      - sqlserver
    # restart: on-failure #avoiding the healthcheck
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5003:8080"

  notifications-api:
    build:
      context: ../NotificationsApi
      dockerfile: Notifications.Api/Dockerfile
    container_name: notifications-api
    depends_on:
      - sqlserver
    # restart: on-failure #avoiding the healthcheck
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5004:8080"
